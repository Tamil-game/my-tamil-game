<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Game - கல்வி விளையாட்டுகள்</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        h1 { color: #333; margin-bottom: 30px; }
        .container {
            display: flex;
            gap: 20px;
        }
        .game-card {
            width: 200px;
            padding: 40px 20px;
            text-align: center;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.3s ease;
            text-decoration: none;
            color: #444;
            font-weight: bold;
            border: 2px solid transparent;
        }
        .game-card:hover {
            transform: translateY(-10px);
            border-color: #007bff;
        }
        .game-card i { font-size: 40px; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1>Master Game Dashboard</h1>
    
    <div class="container">
        <a href="Game.html" class="game-card">
            <div>🎮</div>
            Main Game
        </a>

        <a href="match_game.html" class="game-card">
            <div>🧩</div>
            Match Game
        </a>
    </div>

</body>
</html>
